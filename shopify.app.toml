# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "811fa4e3c82a3aaa90b8db867a5d132c"
name = "Credit System"
application_url = "https://authorization-marketplace-elizabeth-western.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "https://authorization-marketplace-elizabeth-western.trycloudflare.com/webhooks/app/scopes_update"

[[webhooks.subscriptions]]
topics = ["orders/paid"]
uri = "https://authorization-marketplace-elizabeth-western.trycloudflare.com/webhooks/orders-paid"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "https://authorization-marketplace-elizabeth-western.trycloudflare.com/webhooks/app/uninstalled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,write_metaobject_definitions,write_metaobjects,read_orders,read_products,write_products"
optional_scopes = []
use_legacy_install_flow = false

[auth]
redirect_urls = [
    "https://authorization-marketplace-elizabeth-western.trycloudflare.com/api/auth",
]

[app_proxy]
url = "https://authorization-marketplace-elizabeth-western.trycloudflare.com/apps/save-collection"
subpath = "save-collection"
prefix = "apps"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

[product.metafields.app.demo_info.access]
admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

[metaobjects.app.example.access]
admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
